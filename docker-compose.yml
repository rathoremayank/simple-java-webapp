version: '3.9'

services:
  simple-java-webapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: simple-java-webapp
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xms128m -Xmx512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - webapp-network

networks:
  webapp-network:
    driver: bridge
